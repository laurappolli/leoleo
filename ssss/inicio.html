    <script>

        function adicionar(nome, preco){

            let carrinho = localStorage.getItem("carrinho");

            if(carrinho == null){
                carrinho = [];
            }
            else{
                carrinho = JSON.parse(carrinho);
            }

            carrinho[carrinho.length] = {
                nome: nome,
                preco: preco
            };
            localStorage.setItem(
                "carrinho",
                JSON.stringify(carrinho)
            );

            alert("Produto adicionado!");
        }

    </script>
